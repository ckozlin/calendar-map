        function dist(a,b){
            var dx = a[0]-b[0];
            var dy = a[1]-b[1];
            return dx*dx + dy*dy;
        }

        var stopIndices = [];

        stops.forEach(function(stop){
            var bestIndex = 0;
            var bestDist = Infinity;

            for(var i=0;i<route.length;i++){

                    bestIndex = i;
                }
            }

            stopIndices.push(bestIndex);
        });

        var i = 0;
        var trailCoords = [];

        function moveMarker(){

            var pt = route[i];

            marker.setLatLng(pt);

            trailCoords.push(pt);
            trail.setLatLngs(trailCoords);

            if(stopIndices.includes(i)){

            } else {
                setTimeout(step, 165);
            }

        function step(){

            i++;

            if(i >= route.length){
                i = 0;
                trailCoords = [];
                trail.setLatLngs([]);
            }

            moveMarker();
        }

        moveMarker();
