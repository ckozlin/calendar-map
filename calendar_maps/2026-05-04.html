        fillColor:"#9333ea",
        fillOpacity:1,
        weight:3
    }).addTo(map);

    var trail = L.polyline([], {
        color:"#a855f7",
        weight:4,
        opacity:0.6
    }).addTo(map);

    function pulseStop(pt) {

        var circle = L.circle(pt,{
            radius:40,
            color:"#9333ea",
            opacity:0.6,
            weight:2,
            fill:false
        }).addTo(map);

        var r = 40;

        var grow = setInterval(function(){
            r += 20;
            circle.setRadius(r);
            circle.setStyle({opacity:0.6-(r/300)});

            if(r>220){
                map.removeLayer(circle);
                clearInterval(grow);
            }

        },40);
    }

    var legIndex = 0;
    var pointIndex = 0;
    var trailCoords = [];

    function step(){

        var leg = legs[legIndex];
        var pt = leg[pointIndex];

        marker.setLatLng(pt);

        trailCoords.push(pt);
        trail.setLatLngs(trailCoords);

        pointIndex++;

        if(pointIndex >= leg.length){

            pulseStop(pt);

            legIndex++;

            if(legIndex >= legs.length){
                legIndex = 0;
                pointIndex = 0;
                trailCoords = [];
                trail.setLatLngs([]);
                setTimeout(step,1200);
                return;
            }

            pointIndex = 0;
            setTimeout(step,900);
            return;
        }

        setTimeout(step,32);
    }

    step();

});
